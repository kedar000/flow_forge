spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flowforge
    username: postgres
    password: postgres

  output:
    ansi:
      enabled: ALWAYS

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080


management:
  otlp:
    metrics:
      export:
        enabled: false
